name: Publish to npm

# Publishes the package to npm with a provenance statement.
# Required by n8n: verified community nodes must be published via GitHub
# Actions with provenance (not from a local machine).
#
# Trigger: create a GitHub Release (recommended), or run manually.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # npm >= 11.5.1 is required for OIDC trusted publishing; Node 22 ships
      # npm 10.x, so upgrade before publishing.
      - run: npm install -g npm@latest

      - run: npm ci

      - run: npm run build

      # No token needed: trusted publishing authenticates via OIDC
      # (id-token: write above), and provenance is attached automatically.
      - run: npm publish --provenance --access public
